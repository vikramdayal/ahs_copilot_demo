name: ahs-copilot

x-ahs-common: &ahs-common
  build:
    context: .
    args:
      AHS_MODEL_EXTRAS: ${AHS_MODEL_EXTRAS:-ui}
  image: ahs-copilot:${AHS_IMAGE_TAG:-local}
  init: true
  read_only: true
  pids_limit: 256
  stop_grace_period: 20s
  tmpfs:
    - /tmp:size=2g,mode=1777
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  env_file:
    - path: ${AHS_ENV_FILE:-.env}
      required: false
  healthcheck:
    test: ["CMD", "python", "/app/scripts/healthcheck.py"]
    interval: 30s
    timeout: 5s
    start_period: 30s
    retries: 3

services:
  ahs-sample:
    <<: *ahs-common
    profiles: ["sample"]
    restart: "no"
    environment:
      AHS_DATA_MODE: sample
      AHS_CONFIG_PATH: /app/config/ahs_engine.toml
      AHS_MODEL_PROVIDER: demo
      AHS_MODEL_NAME: ""
      PORT: 8501
    ports:
      - "127.0.0.1:${AHS_SAMPLE_PORT:-8501}:8501"
    volumes:
      - ./config/docker.sample.toml:/app/config/ahs_engine.toml:ro

  ahs-production:
    <<: *ahs-common
    profiles: ["production"]
    restart: unless-stopped
    environment:
      AHS_DATA_MODE: production
      AHS_CONFIG_PATH: /app/config/ahs_engine.toml
      PORT: 8501
    ports:
      - "127.0.0.1:${AHS_PRODUCTION_PORT:-8501}:8501"
    volumes:
      - ./config/docker.production.toml:/app/config/ahs_engine.toml:ro
      - "${AHS_DATA_DIR:-./data}:/data/ahs:ro"
