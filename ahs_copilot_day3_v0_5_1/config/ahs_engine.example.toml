[engine]
memory_limit = "512MB"
temp_directory = "../.duckdb_tmp"
threads = 4
preserve_insertion_order = false
max_result_rows = 10000
csv_sample_size = 20480

[fixture]
mode = "auto" # auto | required | disabled
directory = "../tests/fixtures/synthetic"

[metadata]
source_files = "../metadata/source_files.json"
execution_catalog = "../metadata/execution_catalog.json"
semantic_catalog = "../metadata/semantic_catalog.json"

[datasets.household]
source_file_id = "source_national_puf_household"
env = "AHS_HOUSEHOLD_CSV"
path = "../data/household.csv"
fixture_file = "household.csv"

[datasets.mortgage]
source_file_id = "source_puf_mortgage"
env = "AHS_MORTGAGE_CSV"
path = "../data/mortgage.csv"
fixture_file = "mortgage.csv"

[datasets.projects]
source_file_id = "source_puf_projects"
env = "AHS_PROJECTS_CSV"
path = "../data/projects.csv"
fixture_file = "projects.csv"

[survey]
decimal_scale = 6
minimum_unweighted_n = 1
null_suppressed_estimates = true
