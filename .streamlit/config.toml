[theme]
base = "light"
primaryColor = "#007F86"
backgroundColor = "#F4F8FA"
secondaryBackgroundColor = "#E8F0F4"
textColor = "#102A43"
font = "sans serif"

[server]
headless = true
runOnSave = false
fileWatcherType = "none"
maxUploadSize = 20
enableXsrfProtection = true
enableCORS = true

[browser]
gatherUsageStats = false
